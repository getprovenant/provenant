[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
exclude-dev = true
exclude-unpublished = true
exclude = ["provenant-xtask"]

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    # RUSTSEC-2026-0194 (quadratic duplicate-attribute check) and
    # RUSTSEC-2026-0195 (unbounded namespace-declaration allocation) are both
    # DoS advisories against quick-xml < 0.41.0. The fix is in quick-xml
    # >= 0.41.0, but the vulnerable versions are held below it by transitive
    # requirements we cannot resolve: office_oxide 0.1.2 (via pdf_oxide) pins
    # quick-xml "0.40" and rusty-axml 0.2.1 pins "0.38", both of which exclude
    # 0.41. No compatible fixed version is resolvable until those crates bump
    # their quick-xml requirement. Remove once they do.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = true
unused = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
confidence-threshold = 0.93
unused-license-exception = "deny"
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "bzip2-1.0.6",
]
exceptions = [
    { crate = "option-ext", allow = ["MPL-2.0"] },
    # LRU cache used by gix's object database (serve repository ingestion). MPL-2.0
    # is weak, file-level copyleft with no viral effect on Provenant's Apache-2.0 code.
    { crate = "uluru", allow = ["MPL-2.0"] },
]
