[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
exclude-dev = true
exclude-unpublished = true
exclude = ["provenant-xtask"]

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    # Still pulled transitively by pdf_oxide. Provenant no longer depends on
    # ttf-parser directly; remove this once pdf_oxide migrates away.
    "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = true
unused = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
confidence-threshold = 0.93
unused-license-exception = "deny"
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "bzip2-1.0.6",
]
exceptions = [
    { crate = "option-ext", allow = ["MPL-2.0"] }
]
