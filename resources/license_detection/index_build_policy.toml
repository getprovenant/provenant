# Rules and licenses Provenant intentionally excludes when building the license index.
#
# Rule identifiers must match LoadedRule.identifier values (typically full filenames).
# License entries must match LoadedLicense.key values.
#
# This manifest keeps the small, reviewable curation decisions:
# - `ignored_rules` / `ignored_licenses` remove upstream entries.
# - `overlay_reasons.rules` / `overlay_reasons.licenses` must document why each
#   bundled overlay file exists, keyed by the overlay filename.
# - file-based add/replace overlays live under `resources/license_detection/overlay/`
#   using the exact upstream `.RULE` / `.LICENSE` syntax.
# - overlay semantics are collision-based: matching identifiers/keys replace
#   upstream entries, new identifiers/keys are added.
#
# The active curation fingerprint and applied changes are embedded into the
# generated license artifact and surfaced in scan output headers.

ignored_rules = [
  # Android-generated header boilerplate says this text contains no copyrightable information; see ScanCode PR #4683.
  "gpl-2.0_and-unknown-license-reference_1.RULE",
  # Bare freertos.org URL references such as a00127.html false-positive as GPL-2.0+ WITH FreeRTOS exception; see ScanCode issues #4147 and #4441.
  "gpl-2.0-plus_with_freertos-exception-2.0_1.RULE",
  # Bare CAL-1.0 tokenization false-positives on calibration macros; see ScanCode issue #4740 and PR #4759.
  "cal-1.0_10.RULE",
]

ignored_licenses = []

[overlay_reasons.rules]
"agpl-3.0-plus_101.RULE" = "Treat bare AGPL mentions as clue-only evidence so short comparative references stay inspectable without becoming hard detections."
"apache-2.0_and_lgpl-2.1_1.RULE" = "Keep the mixed Apache-2.0/LGPL-2.1 notice detectable only when both COPYING.LGPL and COPYING.ASL2 references are actually present."
"apache-2.0_and_lgpl-2.1_2.RULE" = "Preserve a real typoed Apache-2.0/LGPL-2.1 notice seen in the wild without broadening generic dual-license detection."
"apache-2.0_and_lgpl-2.1_4.RULE" = "Cover the GNU/Linux wording variant of the typoed mixed Apache-2.0/LGPL-2.1 notice while keeping it tight enough to avoid loose partial matches."
"bsd-new_1319.RULE" = "Prevent two-clause BSD headers from being mislabeled as BSD-3-Clause when this upstream rule matches text that lacks the endorsement clause; keep the fix in rule curation instead of matcher logic."
"bsd-new_99.RULE" = "Require a full continuous match for this BSD-3 endorsement-clause rule so BSD-2-style headers such as the Opus and GLC fixtures do not partially overmatch it."
"bsd_bare_word_only.RULE" = "Treat bare versionless BSD shorthand as clue-only evidence so a declared license=\"BSD\" manifest statement can normalize to bsd-new without bare BSD becoming a hard file-content detection."
"gpl-1.0-plus_351.RULE" = "Keep the weak phrase 'the GPL' as clue-only GPL evidence without turning acronym collisions such as Graphics Pipeline Library into hard detections."
"gpl-1.0-plus_461.RULE" = "Require the explicit 'version 1, or (at your option) any later version' wording so split-string GPLv2+ notices do not overmatch as GPL-1.0-or-later."
"gpl-1.0-plus_568.RULE" = "Treat the unversioned GPL boilerplate prefixed by a bare 'License' label as a false-positive fragment so explicit later versioned notices are not polluted by GPL-1.0-or-later noise."
"gpl-1.0-plus_569.RULE" = "Treat the unversioned GPL boilerplate plus old gpl.html URL as a false-positive fragment so explicit later versioned notices are not polluted by GPL-1.0-or-later noise."
"gpl-1.0-plus_571.RULE" = "Treat the unversioned gpl.html shorthand as a false-positive fragment so generic GNU GPL references with the old FSF URL do not hard-detect as GPL-1.0-or-later."
"gpl-2.0-plus_239.RULE" = "Require the actual COPYING filename phrase for this rule so GPL-2.0-or-later notices without that local-file reference do not inherit a referenced filename they never mention."
"gpl-2.0-plus_794.RULE" = "Require the actual COPYING filename phrase for this rule so GPL-2.0-or-later notices without that local-file reference do not inherit a referenced filename they never mention."
"gpl_147.RULE" = "Treat the weak GPL-plus-url notice as a false-positive fragment so generic GPL links do not force GPL-1.0-or-later detections when a stronger later-version notice is present."
"gpl_15.RULE" = "Require the explicit 'located in the file LICENSE' wording so generic GPL notices with a separate later-version line do not overmatch as GPL-1.0-or-later."
"gpl-2.0-plus_1119.RULE" = "Treat the bare 'freely available under the GPL' notice as clue-only because versionless GPL wording is too weak to assert GPL-2.0-or-later; identified by the rule-overmatch classifier (VersionMismatch/version-anchor-missing)."
"gpl-2.0-plus_1120.RULE" = "Treat the bare 'freely available under the GPL' notice as clue-only because versionless GPL wording is too weak to assert GPL-2.0-or-later; identified by the rule-overmatch classifier (VersionMismatch/version-anchor-missing)."
"gpl-2.0-plus_530.RULE" = "Treat the bare 'licensed under the GPL' WordPress-style notice as clue-only because versionless GPL wording is too weak to assert GPL-2.0-or-later; identified by the rule-overmatch classifier (VersionMismatch/version-anchor-missing)."
"gpl-2.0_1470.RULE" = "Require the explicit 'License: GPL-2' anchor so later-version BusyBox-style GPL notices do not partially overmatch as GPL-2.0-only."
"gpl-2.0_470.RULE" = "Correct this BusyBox-style 'version 2 or later' notice to GPL-2.0-or-later instead of GPL-2.0-only."
"gpl-3.0_with_gcc-exception-3.1_16.RULE" = "Keep a known GPL-3.0-plus-GCC-exception reference from being split into weaker fragment matches that lose the intended combined meaning."
"gpl-3.0_612.RULE" = "Require the explicit 'License: GPL-3' anchor so generic GPL-family notices without that version text are not misread as GPL-3.0-only."
"gpl-3.0_613.RULE" = "Require the explicit version-3 wording so LGPL-2.1-only headers are not misread as GPL-3.0-only."
"lgpl-3.0_57.RULE" = "Require the explicit version-3 wording so generic GPL-family notices without that version text are not misread as LGPL-3.0-only."
"gpl-2.0-plus_squashfs_printf_1.RULE" = "Cover the Squashfs printf-split GPL-2.0-or-later notice so it wins over weak LGPL or GPL-1 fragment matches on the same string-literal source form."
"lgpl-2.0-plus_412.RULE" = "Require the explicit GNU Library Public License wording so GPL notices do not overmatch this LGPL-2.0-or-later rule."
"gpl1_bare_word_only.RULE" = "Treat bare GPL1 mentions as clue-only evidence because they are too weak to assert a concrete GPL license by themselves."
"gpl_bare_word_only.RULE" = "Treat bare GPL mentions as clue-only evidence so short shorthand stays inspectable without becoming a false-positive hard detection."
"lgpl-2.1_pyconsole_1.RULE" = "Cover the GIMP pyconsole LGPL-2.1-only header variant so it wins over the weaker GPL-3 fragment match."
"mit_attribution_no_endorsement.RULE" = "Preserve correct MIT-family classification for this vendor-specific variant without letting the embedded Sinusoidal Systems AB names drive the match."
"mpl-1.1_or_gpl-2.0_or_apache-2.0_2.RULE" = "Correct the mislabeled RabbitMQ triple-license notice to MPL-2.0: the upstream rule text says \"Mozilla Public License 2.0\" but its expression was left as mpl-1.1, so this file detected as MPL-1.1 instead of MPL-2.0 (ScanCode issue #5229). Keep the upstream identifier so it replaces the mislabeled rule in place."
"mpl-1.1_or_gpl-2.0-plus_or_lgpl-2.1-plus_16.RULE" = "Correct the MPL version to MPL-2.0: this Maven POM <license> tag points to http://www.mozilla.org/MPL/2.0/index.txt (the canonical MPL-2.0 URL) but its expression was left as mpl-1.1. Same mislabel class as ScanCode issue #5229. Keep the upstream identifier so it replaces the mislabeled rule in place."
"mpl-1.1_or_gpl-2.0-plus_or_lgpl-2.1-plus_30.RULE" = "Correct the MPL version to MPL-2.0: this Maven POM <license> tag points to http://www.mozilla.org/MPL/2.0/index.txt (the canonical MPL-2.0 URL) but its expression was left as mpl-1.1. Same mislabel class as ScanCode issue #5229. Keep the upstream identifier so it replaces the mislabeled rule in place."
"epl-2.0_or_apache-2.0_7.RULE" = "Correct the EPL version to EPL-1.0: this Jetty header text says \"Eclipse Public License v1.0 and Apache License v2.0\" but was misfiled in the epl-2.0_or_apache-2.0 family (every other rule in that family names EPL v2.0, and an epl-1.0_or_apache-2.0 family already exists). Keep the upstream identifier so it replaces the mislabeled rule in place."
"lgpl-2.0-plus_pulseaudio_url_1.RULE" = "Cover the current PulseAudio LGPL-2.0-or-later notice variant that ends with the gnu.org URL so it wins over the weak AGPL notice overmatch on the same text."
"lgpl-2.1-plus_pulseaudio_url_1.RULE" = "Cover the current PulseAudio LGPL-2.1-or-later notice variant that ends with the gnu.org URL so explicit 2.1 headers do not collapse to the looser LGPL-2.0 rule."
"stable-diffusion-2022-08-22_required_phrase_1.RULE" = "Keep the dated Stable Diffusion August 22, 2022 CreativeML variant from collapsing into a different license variant during detection."
"unknown_10.RULE" = "Narrow the upstream unknown-license-reference rule to the reviewed 'See LICENSE file for details' shape with a required LICENSE filename instead of letting broader mentions overmatch."

[overlay_reasons.licenses]
"cc-pdm-1.0.LICENSE" = "Require materially more than a handful of public-domain words before surfacing CC-PDM-1.0, so tiny unrelated prose fragments do not survive as low-quality clues."
