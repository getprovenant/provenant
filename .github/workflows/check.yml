name: CI

on:
  push:
    branches:
      - main
      - "renovate/*"
  pull_request:
    types: [opened, reopened, synchronize]

# Cancel superseded PR runs so they do not consume the shared runner pool.
# Keep main/renovate pushes non-cancelling so overlapping merges are not aborted.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Kept separate from Code Quality: recursive ScanCode submodule checkout is
  # specialized cost we do not want on every lint/clippy run.
  license-index:
    name: Verify Embedded License Index
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: embedded-license-index

      - name: Verify embedded license index
        uses: ./.github/actions/verify-embedded-license-index

      - name: Verify ScanCode output format version sync
        uses: ./.github/actions/verify-scancode-output-format-version

      - name: Verify NOTICE attribution sync
        uses: ./.github/actions/verify-notice-attribution-sync

  rust-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""
          components: rustfmt, clippy

      - name: Read Rust toolchain version
        id: rust-toolchain-version
        shell: bash
        run: |
          version="$(python3 - <<'PY'
          import tomllib

          with open('rust-toolchain.toml', 'rb') as fh:
              print(tomllib.load(fh)['toolchain']['channel'])
          PY
          )"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check SPDX-style license headers
        run: cargo run --quiet --locked --manifest-path tools/license-headers/Cargo.toml -- --check

      - name: Check release version sync
        run: ./scripts/check_release_version_sync.sh

      - name: Check license config sync (about.toml vs deny.toml)
        run: ./scripts/check_license_config_sync.sh

      - name: Check xtask lockfile sync and supported formats
        run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-supported-formats -- --check

      - name: Check serve OpenAPI document
        run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-serve-openapi -- --check

      - name: Check output field reference document
        run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-output-field-reference -- --check

      # Builds a release provenant, shallow-fetches each pinned example repo, and
      # rescans them, so it is heavier than the other generated-doc checks. It
      # needs no Docker/ScanCode (that is verification-time only), just network
      # access to the pinned upstream repositories.
      - name: Check SBOM examples
        run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-sbom-examples -- --check

      - name: Verify packaged crate builds and check size
        run: ./scripts/check_crate_size.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cargo-sort
        run: cargo install --locked cargo-sort

      - name: Check Cargo.toml sorting
        run: ./scripts/cargo_sort_manifests.sh --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check compilation
        run: cargo check --all --verbose

      # `cargo check --all` uses default features, which excludes xtask bins gated
      # behind the non-default `golden` feature (update-license-golden,
      # update-copyright-golden). Check xtask with all features so those bins stay
      # compile-checked.
      - name: Check xtask (all features)
        run: cargo check --manifest-path xtask/Cargo.toml --all-targets --all-features --verbose

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@44db170f6a7d12a6e90340e9e0fca1f650d34b14
        with:
          rust-version: ${{ steps.rust-toolchain-version.outputs.version }}
          manifest-path: ./Cargo.toml
          arguments: ""
          command: check advisories bans licenses sources

      - name: Install cargo-machete
        run: cargo install --locked cargo-machete

      - name: Check for unused dependencies
        run: ./scripts/check_unused_deps.sh

      # Folded from Documentation Quality: Node checks share this checkout/toolchain
      # slot and stay under the ~10m critical path without a separate runner.
      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "24"

      - name: Install npm dependencies
        run: npm ci

      - name: Check agent skills mirror
        run: npm run skills:check

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Validate URLs
        run: npm run validate:urls

      - name: Lint Markdown
        run: npm run lint:md

  rust-library-tests:
    name: Rust Library Tests
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-library-tests-ci-release

      - name: Run library tests except scanner/assembly contract layer
        run: "cargo test -p provenant-cli --lib --profile ci-release --verbose -- --skip _scan_test::"

      - name: Run doctests
        run: cargo test -p provenant-cli --doc --profile ci-release --verbose

  # Kept separate from Rust Library Tests: folding it in serialized a second
  # feature-set build after ci-release lib+doctests and pushed that job to ~18m.
  no-default-features-smoke:
    name: No-default-features Smoke Test
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: no-default-features-smoke

      - name: Check no-default-features build
        run: cargo check --lib --no-default-features

      - name: Run no-default-features parser smoke tests
        run: |
          cargo test --lib --no-default-features parsers::rpm_db::tests::test_bdb_parser_is_match -- --exact
          cargo test --lib --no-default-features parsers::rpm_db_scan_test::tests::test_rpm_bdb_scan_assigns_referenced_files_from_fedora_rootfs -- --exact

  windows-build-smoke:
    name: Windows Build Smoke Test
    runs-on: windows-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build-smoke

      - name: Build and run Windows CLI smoke check
        run: |
          cargo run --quiet --locked --bin provenant -- show-attribution | Out-Null
          cargo run --quiet --locked --bin provenant -- export-license-dataset --help | Out-Null
          cargo run --quiet --locked --bin provenant -- scan --help | Out-Null
          cargo run --quiet --locked --bin provenant -- serve --help | Out-Null
          cargo run --quiet --locked --bin provenant -- compare --help | Out-Null

      # Real scan + golden diff, so Windows-specific output behavior (path
      # separators, file_type, detection line spans) is verified, not just startup.
      - name: Cross-platform scan smoke check
        shell: bash
        run: ./scripts/smoke_scan_check.sh

  intel-macos-build-smoke:
    name: Intel macOS Build Smoke Test
    runs-on: macos-15-intel
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: intel-macos-build-smoke

      - name: Build and run Intel macOS CLI smoke check
        run: |
          cargo run --quiet --locked --bin provenant -- show-attribution > /dev/null
          cargo run --quiet --locked --bin provenant -- export-license-dataset --help > /dev/null
          cargo run --quiet --locked --bin provenant -- scan --help > /dev/null
          cargo run --quiet --locked --bin provenant -- serve --help > /dev/null
          cargo run --quiet --locked --bin provenant -- compare --help > /dev/null

      # Real scan + golden diff, so macOS-specific output behavior (path separators,
      # file_type, detection line spans) is verified, not just startup.
      - name: Cross-platform scan smoke check
        run: ./scripts/smoke_scan_check.sh

  linux-musl-build-smoke:
    name: Linux musl Build Smoke Test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""
          target: ${{ matrix.target }}

      - name: Install musl build tools
        run: sudo apt-get update && sudo apt-get install --assume-yes musl-tools

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-musl-build-smoke-${{ matrix.target }}

      # Builds and runs the statically-linked musl binary, so a musl-specific
      # allocator, bundled-C, linker, or startup failure surfaces here rather than
      # only when a release tag publishes artifacts.
      - name: Build and run static musl CLI smoke check
        run: |
          cargo run --quiet --locked --target ${{ matrix.target }} --bin provenant -- show-attribution > /dev/null
          cargo run --quiet --locked --target ${{ matrix.target }} --bin provenant -- scan --help > /dev/null

      # Real scan + golden diff against the shipped static musl binary, so its
      # output behavior (not just startup) is verified before a release ships it.
      - name: Cross-platform scan smoke check
        run: ./scripts/smoke_scan_check.sh ${{ matrix.target }}

  rust-sharded-tests:
    name: Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    # These suites finish in a few minutes; cap the job so a scheduling/deadlock
    # regression fails fast instead of running to GitHub's 6-hour default.
    timeout-minutes: 25
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: contracts
            shared_key: rust-scan-integration-tests-ci-release-contracts
          - shard: integration
            shared_key: rust-scan-integration-tests-ci-release-integration
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.shared_key }}

      - name: Run parser-local scanner/assembly contract tests
        if: matrix.shard == 'contracts'
        run: "cargo test --lib --profile ci-release --verbose _scan_test::"

      - name: Run scanner integration suite
        if: matrix.shard == 'integration'
        run: cargo test --test scanner_integration --profile ci-release --verbose

      - name: Run scanner copyright/credits integration suite
        if: matrix.shard == 'integration'
        run: cargo test --test scanner_copyright_credits --profile ci-release --verbose

      - name: Run progress CLI integration suite
        if: matrix.shard == 'integration'
        run: cargo test --test progress_cli_integration --profile ci-release --verbose

      - name: Run output contract fixture suite
        if: matrix.shard == 'integration'
        run: cargo test --test output_format_golden --profile ci-release --verbose

      # The progress-CLI suite above already builds `provenant` at
      # `target/ci-release/provenant` (it exercises `CARGO_BIN_EXE_provenant`),
      # so this reuses that binary instead of paying for a second CLI build in
      # a standalone job. Official/reference validators for each spec: the
      # CycloneDX JSON-Schema + XSD (via cyclonedx-python-lib) and the SPDX
      # tag-value/RDF parser and full document validator (via spdx-tools'
      # pyspdxtools). Catches schema regressions goldens alone can miss, like
      # https://github.com/getprovenant/provenant/issues/1288.
      - name: Set up Python
        if: matrix.shard == 'integration'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-output-format-validators.txt

      - name: Install CycloneDX/SPDX validator tooling
        if: matrix.shard == 'integration'
        run: pip install -r scripts/requirements-output-format-validators.txt

      - name: Validate output-format fixtures against official external validators
        if: matrix.shard == 'integration'
        run: python3 scripts/validate_output_format_fixtures.py --provenant-bin target/ci-release/provenant

  # All golden suites in one job: debug then ci-release. Empirically each profile
  # group is ~3–4m, so the combined job should stay under the ~10m critical path
  # while cutting another runner-queue slot. Suites stay as separate cargo
  # invocations so a failure names the owning suite in the log.
  golden-tests:
    name: Golden Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: golden-tests

      - name: Run debug-profile golden suites
        shell: bash
        run: |
          set -euo pipefail
          for suite in assembly_golden finder_golden parsers_golden; do
            echo "Running golden suite: ${suite} (debug)"
            cargo test --test "${suite}" --verbose --features golden-tests
          done

      - name: Run ci-release-profile golden suites
        shell: bash
        run: |
          set -euo pipefail
          for suite in copyright_golden license_detection_golden post_processing_golden; do
            echo "Running golden suite: ${suite} (ci-release)"
            cargo test --test "${suite}" --profile ci-release --verbose --features golden-tests
          done
